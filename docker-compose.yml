services:
  api:
    container_name: steamshark-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: no
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-:8800}
      - DB_PATH=${DB_PATH:-/app/data/steamshark.db}
      - DB_HOST=${DB_HOST:-steamshark-db}
      - DB_PORT=${DB_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-steamshark}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
    ports:
      - 8800:8800
    networks:
      - db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:8800/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
  db:
    container_name: steamshark-db
    image: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - PGDATA={POSTGRES_DATA:-/data/postgres}
      - POSTGRES_DB=${POSTGRES_DB:-steamshark}
    volumes:
      - db:/data/postgres
      - ./db:/docker-entrypoint-initdb.d:ro
    #ports:
    #  - "5332:5432"
    expose:
      - 5432
    networks:
      - db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  db:
    driver: bridge

volumes:
  db:

